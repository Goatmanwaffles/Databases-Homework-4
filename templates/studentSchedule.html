{% extends "base.html" %}
{% block content %}

{% if (schedule|length > 0) %}
<div class="ml-16 mr-16">
<form class="flex flex-row" method="POST">
    <label for="filterYear">Filter: </label>
    <select id="filterYear" name="filterYear">
        {% for year in years %}
            <option value="{{year}}" {% if (selected_year == year|string) %}selected{% endif %}>{{year}}</option>
        {% endfor %}
    </select>
    <input type="submit" class="p-1 rounded-xl bg-sky-400">
</form>

<table class="w-full text-sm border-collapse table-fixed gap-4">
    <thead>
    <tr class="font-semibold text-lg text-sky-500 uppercase">
        <th>STU ID:</th>
        <th>STU NAME:</th>
        <th>COURSE ID:</th>
        <th>SEMESTER:</th>
        <th>YEAR:</th>
    </tr>
    </thead>
    <tbody class="divide-y divide-gray-100">
{% for class in schedule %}
    <tr class="hover:bg-gray-400 transition-colors border-1 border-gray-100 text-center">
        {% for d in class %}
            <td class="px-4 py-3 text-white text-center">{{d}}</td>
        {% endfor %}
    </tr>
{% endfor %}
</tbody>
</table>
</div>
{% endif %}

{% if (schedule|length == 0) %}
<p class="text-3xl font-bold text-white">NO SCHEDULE FOUND</p>
{% endif %}

{% endblock %}
