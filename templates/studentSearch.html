{% extends "base.html" %}
{% block content %}

<form method="POST" class="font-semibold flex flex-col">
    <label for="studentID">StudentID</label>
    <input type="number" id="studentID" name="studentID" class="shadow border-2 rounded border-gray-200 bg-slate-300 text-black mb-4">
    <label for="studentName">Student Name</label>
    <input id="studentName" name="studentName" class="shadow border-2 rounded border-gray-200 bg-slate-300 text-black mb-4">
    <input type="submit" class="p-2 rounded-xl bg-sky-400 animate hover:bg-sky-600">
</form>

{% endblock %}
